<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Student Results</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Poppins',sans-serif;
        }

        body{
            background:#f4f5fb;
        }

        .studentResultsContainer{
            padding:40px 32px;
        }

        .studentResultsHeading{
            font-size:44px;
            font-weight:700;
            color:#111827;
        }

        .studentResultsSubtitle{
            color:#667085;
            margin-top:4px;
            margin-bottom:30px;
        }

        .studentResultsOverview{
            display:grid;
            grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
            gap:20px;
            margin-bottom:30px;
        }

        .studentResultsCard{
            background:#ffffff;
            border-radius:28px;
            padding:24px;
            border:1px solid #ececec;
        }

        .studentResultsLabel{
            color:#667085;
            font-size:14px;
            margin-bottom:10px;
        }

        .studentResultsValue{
            font-size:42px;
            font-weight:700;
        }

        .resultsPurple{
            color:#675cff;
        }

        .resultsGreen{
            color:#00c896;
        }

        .studentResultsTableCard{
            background:#ffffff;
            border-radius:30px;
            overflow:hidden;
            border:1px solid #ececec;
        }

        .studentResultsTable{
            width:100%;
            border-collapse:collapse;
        }

        .studentResultsTable thead{
            background:#f5f6fb;
        }

        .studentResultsTable th{
            padding:18px 20px;
            text-align:left;
            color:#98a2b3;
            font-size:14px;
        }

        .studentResultsTable td{
            padding:20px;
            border-top:1px solid #ececec;
        }

        .studentMarksBar{
            width:120px;
            height:8px;
            background:#ececec;
            border-radius:30px;
            overflow:hidden;
        }

        .studentMarksFill{
            height:100%;
            background:linear-gradient(to right,#675cff,#1dd5c8);
        }

        .studentGradeBadge{
            display:inline-block;
            padding:7px 14px;
            border-radius:30px;
            background:#dcfff6;
            color:#00c896;
            font-size:13px;
            font-weight:600;
        }

    </style>

</head>

<body>

    <div class="studentResultsContainer">

        <h1 class="studentResultsHeading">
            My Results
        </h1>

        <p class="studentResultsSubtitle">
            Academic marks and performance
        </p>

        <div class="studentResultsOverview">

            <div class="studentResultsCard">

                <p class="studentResultsLabel">
                    TOTAL SUBJECTS
                </p>

                <h2 class="studentResultsValue">
                    6
                </h2>

            </div>

            <div class="studentResultsCard">

                <p class="studentResultsLabel">
                    AVERAGE %
                </p>

                <h2 class="studentResultsValue resultsPurple">
                    86%
                </h2>

            </div>

            <div class="studentResultsCard">

                <p class="studentResultsLabel">
                    GRADE
                </p>

                <h2 class="studentResultsValue resultsGreen">
                    A
                </h2>

            </div>

        </div>

        <div class="studentResultsTableCard">

            <table class="studentResultsTable">

                <thead>

                    <tr>

                        <th>SUBJECT</th>
                        <th>MARKS</th>
                        <th>PERCENTAGE</th>
                        <th>GRADE</th>

                    </tr>

                </thead>

                <tbody>

                    <tr>

                        <td>Science</td>

                        <td>88</td>

                        <td>

                            <div class="studentMarksBar">

                                <div 
                                    class="studentMarksFill"
                                    style="width:88%;"
                                ></div>

                            </div>

                        </td>

                        <td>

                            <span class="studentGradeBadge">
                                A
                            </span>

                        </td>

                    </tr>

                    <tr>

                        <td>Physics</td>

                        <td>91</td>

                        <td>

                            <div class="studentMarksBar">

                                <div 
                                    class="studentMarksFill"
                                    style="width:91%;"
                                ></div>

                            </div>

                        </td>

                        <td>

                            <span class="studentGradeBadge">
                                A+
                            </span>

                        </td>

                    </tr>

                </tbody>

            </table>

        </div>

    </div>

</body>

</html>
